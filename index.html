.source-bm {background:rgba(251,146,60,.12);color:#fb923c}

/* Summary table */
.summary-wrap{overflow-x:auto;margin-bottom:36px}
table.summary{width:100%;border-collapse:collapse;font-size:.92rem}
table.summary th{background:#1c1f2e;color:#7c8db5;font-weight:600;text-transform:uppercase;

table.summary th.c{text-align:center}
table.summary td{padding:10px 14px;border-bottom:1px solid #1e2130}
table.summary tr:hover{background:#161a27}
.score-cell{text-align:right;font-size:1rem;font-weight:700}
.cnt{text-align:center;color:#a0aec0}

/* Top-3 colour */
.r1 .t-name{color:#ffd700} .r1 .score-cell{color:#ffd700}
.r2 .t-name{color:#c8d0e0} .r2 .score-cell{color:#c8d0e0}
.r3 .t-name{color:#cd7f32} .r3 .score-cell{color:#cd7f32}

/* Detail grid */
h2{font-size:1.1rem;color:#c8d0e8;margin-bottom:14px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:18px}
.team-card{background:#161a27;border:1px solid #242840;border-radius:10px;overflow:hidden}
.team-header{background:#1c2035;padding:12px 15px;display:flex;flex-wrap:wrap;

.t-hname{font-weight:700;font-size:.92rem;color:#d8e0ff;flex:1;min-width:0}
.t-hscore{font-size:.88rem;white-space:nowrap}
.t-badges{display:flex;gap:4px;flex-wrap:wrap}
.ptable{width:100%;border-collapse:collapse;font-size:.8rem}
.ptable th{background:#141728;color:#606880;font-weight:600;font-size:.7rem;

.ptable td{padding:5px 11px;border-bottom:1px solid #1a1e2e}
.p-rk{color:#606880;width:46px}
.p-nm{color:#c8d0e8}
.p-sc{text-align:right;font-weight:600;width:58px;font-variant-numeric:tabular-nums}
.pos{color:#4ade80} .neg{color:#f87171} .zero{color:#6b7280}
.match-note{color:#4a5068;font-size:.72rem;font-style:italic}

/* Row tier tints */
.t10 {background:rgba(255,215,0,.06)}
.t25 {background:rgba(139,92,246,.05)}
.t50 {background:rgba(59,130,246,.04)}
.t75 {background:rgba(16,185,129,.03)}
.t100{background:rgba(107,114,128,.03)}
.tout td{color:#3a4060}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.7rem;font-weight:600}
.b10 {background:rgba(255,215,0,.18);color:#ffd700}

.b75 {background:rgba(16,185,129,.18);color:#34d399}
.b100{background:rgba(107,114,128,.18);color:#9ca3af}
.bx  {background:rgba(75,85,99,.12);color:#4b5563}

const SOURCE_META = {
  htb: { label:'HashtagBasketball — H2H Averages (Total score)', cls:'source-htb', unit:'' },
  bm:  { label:'BasketballMonster — Per Game Value',             cls:'source-bm',  unit:'' },
};

let currentSrc = 'htb';

function setSource(src) {
  currentSrc = src;
  document.querySelectorAll('.toggle-btn').forEach((b,i) => {
    b.classList.toggle('active', (src==='htb' && i===0)||(src==='bm' && i===1));
  });
  render();
}

function tierClass(rank) {
  if (rank <= 10)  return 't10';
  if (rank <= 25)  return 't25';
  if (rank <= 50)  return 't50';
  if (rank <= 75)  return 't75';
  if (rank <= 100) return 't100';
  return '';
}
function badgeHtml(rank) {
  if (rank <= 10)  return '<span class="badge b10">Top 10</span>';
  if (rank <= 25)  return '<span class="badge b25">Top 25</span>';
  if (rank <= 50)  return '<span class="badge b50">Top 50</span>';
  if (rank <= 75)  return '<span class="badge b75">Top 75</span>';
  if (rank <= 100) return '<span class="badge b100">Top 100</span>';
  return '';
}
function fmt(v, src) {
  return src === 'htb' ? v.toFixed(2) : v.toFixed(2);
}

function render() {
  const data = currentSrc === 'htb' ? HTB_DATA : BM_DATA;
  const meta = SOURCE_META[currentSrc];

  // Source label
  document.getElementById('source-label').innerHTML =
    `<span class="source-badge ${meta.cls}">📊 ${meta.label}</span>`;

  // Summary table
  let rows = '';
  data.forEach((r,i) => {
    const place = i+1;
    const medal = place===1?'🥇':place===2?'🥈':place===3?'🥉':place;
    const rc = place<=3 ? `r${place}` : '';
    rows += `<tr class="${rc}">
      <td style="font-size:1.05rem;width:46px">${medal}</td>
      <td class="t-name" style="font-weight:600;color:#d0d8f0">${r.team}</td>
      <td class="score-cell">${fmt(r.total,currentSrc)}</td>
      <td class="cnt">${r.top10}</td><td class="cnt">${r.top25}</td>
      <td class="cnt">${r.top50}</td><td class="cnt">${r.top75}</td>
      <td class="cnt">${r.top100}</td>
    </tr>`;
  });
  document.getElementById('summary-section').innerHTML = `
    <div class="summary-wrap"><table class="summary">
      <thead><tr>
        <th style="width:46px">#</th><th>Team</th>
        <th style="text-align:right">Score</th>
        <th class="c">T10</th><th class="c">T25</th>
        <th class="c">T50</th><th class="c">T75</th><th class="c">T100</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  // Detail cards
  let cards = '';
  data.forEach(r => {
    const sorted = [...r.players].sort((a,b) => a.rank - b.rank);
    let prows = '';
    sorted.forEach(p => {
      const tc  = p.rank < 9999 ? tierClass(p.rank) : 'tout';
      const bdg = p.rank < 9999 ? badgeHtml(p.rank) : '<span class="badge bx">Unranked</span>';
      const rkTxt = p.rank < 9999 ? `#${p.rank}` : '—';
      const scCls = p.score > 0 ? 'pos' : p.score < 0 ? 'neg' : 'zero';
      const note  = (p.htb.toLowerCase() !== p.espn.toLowerCase() && p.matched)
                    ? ` <span class="match-note">→ ${p.htb}</span>` : '';
      prows += `<tr class="${tc}">
        <td class="p-rk">${rkTxt}</td>
        <td class="p-nm">${p.espn}${note}</td>
        <td class="p-sc ${scCls}">${p.rank<9999 ? (p.score>0?'+':'')+fmt(p.score,currentSrc) : '—'}</td>
        <td>${bdg}</td>
      </tr>`;
    });
    cards += `<div class="team-card">
      <div class="team-header">
        <span class="t-hname">${r.team}</span>
        <span class="t-hscore" style="color:#60c8ff">Score: <strong>${fmt(r.total,currentSrc)}</strong></span>
        <span class="t-badges">
          <span class="badge b10">T10:${r.top10}</span>
          <span class="badge b25">T25:${r.top25}</span>
          <span class="badge b50">T50:${r.top50}</span>
          <span class="badge b75">T75:${r.top75}</span>
          <span class="badge b100">T100:${r.top100}</span>
        </span>
      </div>
      <table class="ptable">
        <thead><tr><th>Rank</th><th>Player</th><th style="text-align:right">Score</th><th>Tier</th></tr></thead>
        <tbody>${prows}</tbody>
      </table>
    </div>`;
  });
  document.getElementById('detail-section').innerHTML = cards;
}

render();
